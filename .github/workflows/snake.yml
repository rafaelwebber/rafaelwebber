name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"  # Roda todo dia à meia-noite
  workflow_dispatch:     # Permite rodar manualmente
  push:
    branches: [main]
    paths-ignore:       # Evita loop: não dispara quando só a cobrinha foi atualizada
      - 'dist/**'

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Gerar cobrinha com meus commits
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg

      - name: Publicar cobrinha no repositório
        uses: EndBug/add-and-commit@v9
        with:
          message: "🐍 Atualiza cobrinha das contribuições"
          add: "dist/*"
          pull: "--rebase --autostash"
